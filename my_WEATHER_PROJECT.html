<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEATHER API + AQI </title>

<link rel="stylesheet" href="my_WEATHER_PROJECT.css">
<link rel="icon" href="data:,">

</head>
<body>

  <div class="BOX">
    <div class="search">
      <input placeholder="ENTER CITY NAME: " type="text" class="CITY_SEARCH">
      <button><img src="2946467-200.png"></button>
    </div>

    <div class="CITY">
      <div>
      <h2 class="CITY_NAME"></h2>
      </div>
      <h2> WEATHER REPORT </h2>
      </div><br>

      <div class="CONTENT_ROW">

      <div class="TEMPERATURE">
      <h3> CURRENT TEMPERATURE </h3>
        <h1>30°C</h1>
        <div class="COUNTRY">

      <div class="btnss">
        <p>STATUS : </p>
        <p class="type">PLEASANT</p>
        
        </div>
        </div><br>

        </div>
        

    <div class="MIST_WIND">
      
    <div class="MIST">
      <img src="MISTRL.png">
      <h2>MIST</h2><br>
      </div>
      <div class="TYPE_OF_MIST">
      <p>FEELS LIKE </p>
      <h4>28°C</h4>
      </div>
      <div class="HUMIDITY">
        <p>Pressure</p>
        <h4>1013</h4>
      </div>
      <div class="WIND">

        <img src="2045893.png">

        <h2>WIND</h2><br>
        </div>

        <div class="WIND_TYPE">
        <p>WIND SPEED </p>
        <h4> 6 km/hr </h4>
        </div>
      
      </div>

      </div>

      <div class="AQI_CONTAINER">

        <div class="aqii">
          <h3>AQI RATING ( /5)</h3><br>
          <img src="AQI.webp">
          </div><br>

        <div class="MAIN_AQI_MATERIAL">
        <h1> 1-5 </h1>
        <h5> AQI </h5>
      </div>
      <div class="AIR_QUALITY">
        <p>AIR QUALITY IS : </p>
        <h4>POOR</h4>
      </div>
      <div class="PMS_RECORD">
      <div class="PMS">
        <p>PM2.5 : </p>
        <h4>60</h4>
        </div>
        <div class="PMS1">
          <p>PM10 :</p>
          <h4>71</h4>
        </div>
        </div>


      </div>



  </div>


  <script src="my_WEATHER_PROJECT.js"></script>

  
</body>
</html>
